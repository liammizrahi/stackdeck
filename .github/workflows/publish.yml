name: Publish image

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-image
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute CalVer version
        id: version
        run: |
          set -euo pipefail
          YY=$(date +%y)
          latest=$(git tag -l "${YY}.*.*" | sort -V | tail -n1)
          if [ -z "$latest" ]; then
            version="${YY}.0.0"
          else
            major=$(echo "$latest" | cut -d. -f2)
            minor=$(echo "$latest" | cut -d. -f3)
            if [ "$minor" -ge 9 ]; then
              major=$((major + 1))
              minor=0
            else
              minor=$((minor + 1))
            fi
            version="${YY}.${major}.${minor}"
          fi
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner}/stackdeck" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $version (previous: ${latest:-none})"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          tags: |
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          image="${{ steps.version.outputs.image }}"
          gh release create "$version" \
            --target "${{ github.sha }}" \
            --title "$version" \
            --notes "$(printf 'Docker image published to GitHub Container Registry.\n\n```\ndocker pull %s:%s\n```\n\nAlso tagged `%s:latest`.' "$image" "$version" "$image")"
